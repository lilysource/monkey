<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gorilla Center Image</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

/* DARK BACKGROUND */
body{
    background: linear-gradient(135deg,#ffffff,#acacac,#ffffff);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* CENTER CONTAINER */
.center-container{
    text-align:center;
}

/* IMAGE STYLE */
.center-container img{
    width:350px;
    max-width:90%;
    box-shadow:0 15px 40px rgba(0,0,0,0.7);
    transition:0.4s ease;
}
/* ANIMATION */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* MOBILE FIX */
@media(max-width:600px){
    h1{
        font-size:20px;
    }
    .center-container img{
        width:280px;
    }
}

</style>
</head>
<body>

<div class="center-container">
    <img src="images/1.jpg" alt="Gorilla Image">
</div>

</body>
</html>
